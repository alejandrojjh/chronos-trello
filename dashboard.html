<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chronos Reports</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1d2125;
      --surf:    #22272b;
      --surf2:   #282e33;
      --border:  #2c3338;
      --txt:     #b6c2cf;
      --dim:     #738496;
      --accent:  #579dff;
      --green:   #4bce97;
      --yellow:  #f5cd47;
    }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 22px 28px 40px;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
    .hicon { width:32px; height:32px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .htitle { font-size:18px; font-weight:700; color:#fff; letter-spacing:-.3px; }
    .hboard { font-size:11px; color:var(--dim); margin-top:2px; }

    /* ── Summary row ──────────────────────────────────────── */
    .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px; }
    .stat { background:var(--surf); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
    .stat-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--dim); margin-bottom:6px; }
    .stat-val { font-size:22px; font-weight:700; color:#fff; letter-spacing:-1px; font-variant-numeric:tabular-nums; }
    .stat-val.blue  { color:var(--accent); }
    .stat-val.green { color:var(--green); }

    /* ── Section header ───────────────────────────────────── */
    .section { margin-bottom:18px; }
    .sec-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--dim); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Cards breakdown ──────────────────────────────────── */
    .card-block { background:var(--surf); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:6px; }
    .card-row {
      display:flex; align-items:center; padding:10px 14px; gap:10px;
      cursor:pointer; user-select:none;
    }
    .card-row:hover { background:var(--surf2); }
    .card-caret { font-size:10px; color:var(--dim); transition:transform .2s; flex-shrink:0; }
    .card-caret.open { transform:rotate(90deg); }
    .card-name { flex:1; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
    .card-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:600; flex-shrink:0; }
    .card-badge.on  { background:rgba(75,206,151,.12); color:var(--green); }
    .card-badge.off { color:var(--dim); }
    .dot-pulse { width:5px; height:5px; border-radius:50%; background:currentColor; animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .card-total { font-variant-numeric:tabular-nums; font-weight:700; color:var(--accent); font-size:13px; flex-shrink:0; }

    .member-rows { border-top:1px solid var(--border); display:none; }
    .member-rows.open { display:block; }
    .member-row { display:flex; align-items:center; gap:8px; padding:8px 14px 8px 30px; border-bottom:1px solid rgba(44,51,56,.5); }
    .member-row:last-child { border-bottom:none; }
    .av { width:22px; height:22px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; text-transform:uppercase; overflow:hidden; }
    .av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .mbr-name { flex:1; font-size:12px; color:var(--txt); }
    .mbr-pct  { font-size:11px; color:var(--dim); min-width:32px; text-align:right; }
    .mbr-bar-wrap { width:60px; height:4px; background:var(--border); border-radius:2px; flex-shrink:0; }
    .mbr-bar { height:100%; border-radius:2px; background:var(--accent); }
    .mbr-dur { font-variant-numeric:tabular-nums; font-size:12px; font-weight:600; color:var(--txt); min-width:58px; text-align:right; }

    /* ── Per-person per-day ───────────────────────────────── */
    .person-block { background:var(--surf); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:6px; }
    .person-hd { display:flex; align-items:center; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); }
    .person-name { flex:1; font-weight:600; color:#fff; }
    .person-total { font-variant-numeric:tabular-nums; font-weight:700; color:var(--yellow); font-size:13px; }
    .day-group { padding:0 14px 10px; }
    .day-lbl { font-size:10px; font-weight:700; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; padding:8px 0 4px; border-bottom:1px solid var(--border); margin-bottom:4px; display:flex; justify-content:space-between; }
    .day-entry { display:flex; align-items:center; justify-content:space-between; padding:5px 8px; border-radius:4px; }
    .day-entry:hover { background:var(--surf2); }
    .day-entry-name { font-size:12px; color:var(--txt); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .day-entry-dur  { font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--txt); flex-shrink:0; margin-left:10px; }

    /* ── Empty / loading ──────────────────────────────────── */
    .state-msg { text-align:center; padding:32px 16px; color:var(--dim); font-size:12px; }
    .state-ico { font-size:26px; opacity:.35; margin-bottom:8px; }
    .state-sub { font-size:11px; margin-top:6px; opacity:.7; line-height:1.5; }
    .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 10px; }
    @keyframes spin { to{ transform:rotate(360deg); } }

    .ts { font-size:10px; color:var(--dim); text-align:right; margin-top:12px; }
  </style>
</head>
<body>

<div class="header">
  <div class="hicon">⏱</div>
  <div>
    <div class="htitle">Chronos Reports</div>
    <div class="hboard" id="board-name">Cargando…</div>
  </div>
</div>

<div class="summary">
  <div class="stat"><div class="stat-lbl">Horas totales</div><div class="stat-val blue"  id="s-total">—</div></div>
  <div class="stat"><div class="stat-lbl">Tarjetas</div>      <div class="stat-val"       id="s-cards">—</div></div>
  <div class="stat"><div class="stat-lbl">Timers activos</div><div class="stat-val green" id="s-active">—</div></div>
</div>

<div class="section">
  <div class="sec-title">Desglose por tarjeta</div>
  <div id="cards-section">
    <div class="state-msg"><div class="spinner"></div>Leyendo datos…</div>
  </div>
</div>

<div class="section">
  <div class="sec-title">Trabajo por persona y día</div>
  <div id="daily-section">
    <div class="state-msg"><div class="spinner"></div>Leyendo datos…</div>
  </div>
</div>

<div class="ts" id="ts"></div>

<script>
(function () {
  var t = window.TrelloPowerUp.iframe();

  /* ── utils ─────────────────────────────────────────────── */
  function fmt(s) {
    s = Math.max(0, Math.floor(s));
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60]
      .map(function(v){ return String(v).padStart(2,'0'); }).join(':');
  }
  function fmtH(s){ return (s/3600).toFixed(1)+'h'; }
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function initials(n){ return (n||'?').trim().split(/\s+/).slice(0,2).map(function(w){ return w[0]||'?'; }).join('').toUpperCase(); }
  var COLORS=['#579dff','#4bce97','#fea362','#9f8fef','#e774bb','#f87168'];
  function mColor(n){ var h=0; for(var i=0;i<(n||'').length;i++) h=(h*31+n.charCodeAt(i))|0; return COLORS[Math.abs(h)%COLORS.length]; }
  function avHtml(name, url){
    if(url) return '<div class="av"><img src="'+esc(url)+'" onerror="this.style.display=\'none\'"></div>';
    return '<div class="av" style="background:'+mColor(name)+'">'+esc(initials(name))+'</div>';
  }
  function fmtDate(iso){
    var d=new Date(iso+'T00:00:00');
    return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  }

  /* ── render cards section ───────────────────────────────── */
  function renderCards(summary) {
    var ids = Object.keys(summary);
    if (!ids.length) {
      document.getElementById('cards-section').innerHTML =
        '<div class="state-msg"><div class="state-ico">📭</div>Ninguna tarjeta tiene tiempo registrado.<div class="state-sub">Usa el timer en una tarjeta y regresa a este reporte.</div></div>';
      return;
    }

    var cards = ids.map(function(id){ return Object.assign({id:id}, summary[id]); });
    cards.sort(function(a,b){ return b.total-a.total; });

    var html = cards.map(function(card){
      var badge = card.running
        ? '<span class="card-badge on"><span class="dot-pulse"></span>Activo</span>'
        : '<span class="card-badge off">Pausado</span>';

      var memberRows = '';
      if (card.members && card.members.length) {
        card.members.sort(function(a,b){ return b.total-a.total; });
        memberRows = card.members.map(function(m){
          var pct = card.total > 0 ? Math.round(m.total/card.total*100) : 0;
          return '<div class="member-row">'+
            avHtml(m.name, m.avatarUrl)+
            '<div class="mbr-name">'+esc(m.name||'Desconocido')+'</div>'+
            '<div class="mbr-bar-wrap"><div class="mbr-bar" style="width:'+pct+'%"></div></div>'+
            '<div class="mbr-pct">'+pct+'%</div>'+
            '<div class="mbr-dur">'+fmt(m.total)+'</div>'+
          '</div>';
        }).join('');
      }

      return '<div class="card-block">'+
        '<div class="card-row" onclick="this.querySelector(\'.card-caret\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')">'+
          '<span class="card-caret">▶</span>'+
          '<span class="card-name">'+esc(card.name)+'</span>'+
          badge+
          '<span class="card-total">'+fmt(card.total)+'</span>'+
        '</div>'+
        '<div class="member-rows">'+memberRows+'</div>'+
      '</div>';
    }).join('');

    document.getElementById('cards-section').innerHTML = html;
  }

  /* ── render daily section ───────────────────────────────── */
  function renderDaily(daily) {
    /* Aggregate: personId → { name, avatarUrl, total, days:{date→[{cardName,duration}]} } */
    var people = {};

    Object.keys(daily).sort().reverse().forEach(function(day){
      (daily[day]||[]).forEach(function(e){
        var pid = e.memberId || 'unknown';
        if (!people[pid]) people[pid] = { name:e.memberName||'?', avatarUrl:e.avatarUrl||'', total:0, days:{} };
        people[pid].total += e.duration||0;
        if (!people[pid].days[day]) people[pid].days[day] = [];
        /* merge same card in same day */
        var existing = people[pid].days[day].filter(function(x){ return x.cardName===e.cardName; })[0];
        if (existing) { existing.duration += e.duration||0; }
        else          { people[pid].days[day].push({ cardName:e.cardName, duration:e.duration||0 }); }
      });
    });

    var pids = Object.keys(people);
    if (!pids.length) {
      document.getElementById('daily-section').innerHTML =
        '<div class="state-msg"><div class="state-ico">📅</div>Sin datos de desglose diario aún.<div class="state-sub">Los datos diarios se acumulan automáticamente mientras el equipo usa el timer. Aparecerán aquí en la próxima recarga de los badges de las tarjetas.</div></div>';
      return;
    }

    /* Sort people by total desc */
    pids.sort(function(a,b){ return people[b].total-people[a].total; });

    var html = pids.map(function(pid){
      var p = people[pid];
      var dayKeys = Object.keys(p.days).sort().reverse();

      var dayHtml = dayKeys.map(function(day){
        var dayTotal = p.days[day].reduce(function(s,e){ return s+e.duration; },0);
        var entries = p.days[day].slice().sort(function(a,b){ return b.duration-a.duration; });
        var entryHtml = entries.map(function(e){
          return '<div class="day-entry">'+
            '<div class="day-entry-name">'+esc(e.cardName)+'</div>'+
            '<div class="day-entry-dur">'+fmt(e.duration)+'</div>'+
          '</div>';
        }).join('');
        return '<div class="day-group">'+
          '<div class="day-lbl"><span>'+fmtDate(day)+'</span><span>'+fmt(dayTotal)+'</span></div>'+
          entryHtml+
        '</div>';
      }).join('');

      return '<div class="person-block">'+
        '<div class="person-hd">'+
          avHtml(p.name, p.avatarUrl)+
          '<div class="person-name">'+esc(p.name)+'</div>'+
          '<div class="person-total">'+fmt(p.total)+'</div>'+
        '</div>'+
        dayHtml+
      '</div>';
    }).join('');

    document.getElementById('daily-section').innerHTML = html;
  }

  /* ── main ───────────────────────────────────────────────── */
  Promise.all([
    t.board('name').catch(function(){ return { name:'Tablero' }; }),
    t.get('board', 'shared', 'chronos-summary').catch(function(){ return {}; }),
    t.get('board', 'shared', 'chronos-daily').catch(function(){ return {}; })
  ]).then(function (results) {
    var boardName = (results[0]&&results[0].name) || 'Tablero';
    var summary   = results[1] || {};
    var daily     = results[2] || {};

    document.getElementById('board-name').textContent = boardName;

    /* Summary stats */
    var ids = Object.keys(summary);
    var boardTotal  = ids.reduce(function(s,id){ return s+(summary[id].total||0); },0);
    var activeCount = ids.filter(function(id){ return summary[id].running; }).length;
    document.getElementById('s-total').textContent  = fmtH(boardTotal);
    document.getElementById('s-cards').textContent  = ids.length;
    document.getElementById('s-active').textContent = activeCount;

    renderCards(summary);
    renderDaily(daily);

    /* Show cache timestamp */
    var maxTs = ids.reduce(function(m,id){ return Math.max(m, summary[id].updatedAt||0); },0);
    if (maxTs) {
      document.getElementById('ts').textContent =
        'Última actualización: ' + new Date(maxTs).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    }

    t.sizeTo('body').catch(function(){});
  }).catch(function (err) {
    var msg = esc(String(err));
    document.getElementById('cards-section').innerHTML =
      '<div class="state-msg"><div class="state-ico">⚠️</div>Error al cargar.<div class="state-err" style="color:#f87168;font-size:11px;margin-top:6px;font-family:monospace">'+msg+'</div></div>';
    document.getElementById('daily-section').innerHTML = '';
  });

})();
</script>
</body>
</html>
