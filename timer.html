<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TrackingTime</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      color: #b6c2cf;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 0;
    }

    /* ── Header alineado a la derecha ─────────────────────── */
    .wl-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 8px;
    }
    .wl-toggle-btn {
      background: #2c2e33;
      color: #9f9f9f;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .wl-toggle-btn:hover {
      background: #3a3d45;
      color: #fff;
    }

    /* ── Active Timer Block ───────────────────────────────── */
    .tracker-box {
      background: #282a2e;
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .tracker-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }
    .tracker-input {
      background: transparent;
      border: none;
      color: #dee4ea;
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      outline: none;
    }
    .clock {
      font-size: 16px;
      font-weight: 700;
      color: #dee4ea;
      font-variant-numeric: tabular-nums;
    }
    .clock.running {
      color: #fff;
    }
    
    /* Botones */
    .btn {
      border: none;
      background: #3a3d45;
      color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-start { background: #0052cc; }
    .btn-stop  { background: #de350b; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: #2c2e33;
      margin: 14px 0;
    }

    /* ── Entries List ─────────────────────────────────────── */
    .entries-lbl {
      font-size: 11px;
      font-weight: 700;
      color: #8c9199;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .entries {
      list-style: none;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .av {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      overflow: hidden;
    }
    .av img { width: 100%; height: 100%; object-fit: cover; }
    
    .entry-info {
      flex: 1;
      min-width: 0;
    }
    .entry-name {
      font-size: 13px;
      font-weight: 600;
      color: #dee4ea;
    }
    .entry-time {
      font-size: 11px;
      color: #8c9199;
      margin-top: 1px;
    }
    .entry-dur {
      font-size: 13px;
      font-weight: 600;
      color: #dee4ea;
      font-variant-numeric: tabular-nums;
    }

    .empty-msg { font-style: italic; color: #8c9199; padding: 8px 0; }

    /* ── Footer / Acciones en el mismo eje ────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 4px;
    }
    .reset-btn {
      background: none;
      border: none;
      color: #8c9199;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-btn:hover { color: #f87168; }
    .edit-btn {
      background: none;
      border: none;
      color: #579dff;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
    }
    .edit-btn:hover { color: #85b8ff; }
    .reset-btn:disabled, .edit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .save-status { font-size: 11px; color: #8c9199; text-align: right; margin-top: 4px; display: block; }
    .err-banner { display:none; background:#3d1f1f; border:1px solid #7a2d2d; border-radius:4px; padding:6px 10px; font-size:11px; color:#f87168; margin-bottom:6px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="err-banner" id="err-banner"></div>

    <div class="wl-header">
      <button class="wl-toggle-btn" id="toggle-details-btn">Show Details</button>
    </div>

    <div class="tracker-box">
      <div class="tracker-left">
        <input type="text" class="tracker-input" value="Tiempo de tarea activo" id="task-title-mock">
        <div class="clock" id="clock">--:--:--</div>
      </div>
      <button class="btn btn-start" id="toggle-btn" disabled>▶ Iniciar</button>
    </div>

    <div id="details-section" style="display: none;">
      <!-- Fila de Totales de tiempo -->
      <div style="display: flex; justify-content: space-between; font-size: 12px; color: #8c9199; margin-bottom: 10px;">
        <span>Mi total: <strong id="my-total" style="color:#dee4ea;">--:--:--</strong></span>
        <span>Total tarjeta: <strong id="all-total" style="color:#dee4ea;">--:--:--</strong></span>
      </div>

      <div class="divider"></div>

      <div class="entries-lbl">Logs de trabajo</div>
      <ul class="entries" id="entries"></ul>

      <div class="footer">
        <button class="reset-btn" id="reset-btn" disabled>Reiniciar mis datos</button>
        <button class="edit-btn" id="edit-btn" disabled>Modificar datos</button>
      </div>
      <span class="save-status" id="save-status"></span>
    </div>
  </div>

  <script>
  (function () {
    var KEY        = 'chronos';
    var ACTIVE_KEY = 'chronos-active-users';
    var t          = window.TrelloPowerUp.iframe();
    var state      = null;
    var me         = null;
    var tick       = null;

    /* ── helpers ─────────────────────────────────────────── */
    function fmt(sec) {
      sec = Math.max(0, Math.floor(sec||0));
      var h = Math.floor(sec / 3600);
      var m = Math.floor((sec % 3600) / 60);
      var s = sec % 60;
      return [h,m,s].map(function(v){ return String(v).padStart(2,'0'); }).join(':');
    }
    function fmtTime(ts) {
      var d = new Date(ts);
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function initials(name) {
      return (name||'?').trim().split(/\s+/).slice(0,2).map(function(w){ return w[0]||'?'; }).join('').toUpperCase();
    }
    var COLORS = ['#579dff','#4bce97','#fea362','#9f8fef','#e774bb','#f87168'];
    function memberColor(id) {
      var h = 0;
      for (var i = 0; i < (id||'').length; i++) { h = (h * 31 + id.charCodeAt(i)) | 0; }
      return COLORS[Math.abs(h) % COLORS.length];
    }
    function avatarHtml(memberId, memberName, avatarUrl) {
      var color = memberColor(memberId || 'x');
      if (avatarUrl) {
        return '<div class="av"><img src="' + esc(avatarUrl) + '" onerror="this.parentNode.style.background=\'' + color + '\';this.remove()"></div>';
      }
      return '<div class="av" style="background:' + color + '">' + esc(initials(memberName)) + '</div>';
    }
    function showError(msg) {
      var el = document.getElementById('err-banner');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
    function setSaveStatus(msg, isErr) {
      var el = document.getElementById('save-status');
      el.textContent = msg;
      el.className = 'save-status' + (isErr ? ' err' : '');
    }

    // Convertir texto de tiempo a segundos
    function parseTimeToSeconds(str) {
      if (!str) return null;
      str = str.trim().toLowerCase();

      var hMatch = str.match(/(\d+)\s*h/);
      var mMatch = str.match(/(\d+)\s*m/);
      var sMatch = str.match(/(\d+)\s*s/);

      if (hMatch || mMatch || sMatch) {
        var h = hMatch ? parseInt(hMatch[1], 10) : 0;
        var m = mMatch ? parseInt(mMatch[1], 10) : 0;
        var s = sMatch ? parseInt(sMatch[1], 10) : 0;
        return (h * 3600) + (m * 60) + s;
      }

      var parts = str.split(':');
      if (parts.length === 3) {
        return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60) + parseInt(parts[2], 10);
      } else if (parts.length === 2) {
        return (parseInt(parts[0], 10) * 3600) + (parseInt(parts[1], 10) * 60);
      }

      var num = parseFloat(str);
      if (!isNaN(num)) return Math.floor(num * 60);

      return null;
    }

    /* ── time calculations ───────────────────────────────── */
    function myTotal() {
      if (!state || !me) return 0;
      var base = (state.entries||[]).filter(function(e){ return e.memberId === me.id; })
                                    .reduce(function(s,e){ return s+(e.duration||0); },0);
      var sess = state.sessions && state.sessions[me.id];
      if (sess && sess.startTime) base += Math.floor((Date.now()-sess.startTime)/1000);
      return base;
    }
    function allTotal() {
      if (!state) return 0;
      var base = (state.entries||[]).reduce(function(s,e){ return s+(e.duration||0); },0);
      if (state.sessions) {
        Object.keys(state.sessions).forEach(function(id){
          var s = state.sessions[id];
          if (s && s.startTime) base += Math.floor((Date.now()-s.startTime)/1000);
        });
      }
      return base;
    }

    /* ── clock tick ──────────────────────────────────────── */
    function updateClock() {
      if (!state || !me) return;
      var sess = state.sessions && state.sessions[me.id];
      if (!sess || !sess.startTime) return;
      var elapsed = Math.floor((Date.now()-sess.startTime)/1000);
      document.getElementById('clock').textContent    = fmt(elapsed);
      document.getElementById('my-total').textContent = fmt(myTotal());
      document.getElementById('all-total').textContent= fmt(allTotal());
    }

    /* ── render ──────────────────────────────────────────── */
    function render() {
      if (!state || !me) return;

      var btn      = document.getElementById('toggle-btn');
      var resetBtn = document.getElementById('reset-btn');
      var editBtn  = document.getElementById('edit-btn');
      btn.disabled      = false;
      resetBtn.disabled = false;
      editBtn.disabled  = false;

      var mySess  = state.sessions && state.sessions[me.id];
      var running = !!mySess;
      var clockEl = document.getElementById('clock');

      if (running) {
        clockEl.className = 'clock running';
        btn.className = 'btn btn-stop';
        btn.textContent = '⏹ Stop';
        if (!tick) { updateClock(); tick = setInterval(updateClock, 1000); }
      } else {
        if (tick) { clearInterval(tick); tick = null; }
        clockEl.className   = 'clock';
        clockEl.textContent = '00:00:00';
        btn.className = 'btn btn-start';
        btn.textContent = '▶ Play';
        document.getElementById('my-total').textContent  = fmt(myTotal());
        document.getElementById('all-total').textContent = fmt(allTotal());
      }

      /* Entradas recientes (Logs) */
      var entries = (state.entries||[]).slice().reverse().slice(0,7);
      var el = document.getElementById('entries');
      
      if (!entries.length) {
        el.innerHTML = '<li class="empty-msg">Sin registros en esta tarjeta</li>';
      } else {
        el.innerHTML = entries.map(function(e){
          var isMe = e.memberId===me.id;
          var name = isMe ? 'Tú' : (e.memberName||'Desconocido');

          return '<li class="entry">' +
            avatarHtml(e.memberId, e.memberName, e.avatarUrl) +
            '<div class="entry-info">' +
              '<div class="entry-name">'+esc(name)+'</div>' +
              '<div class="entry-time">'+fmtTime(e.start)+' – '+fmtTime(e.end||Date.now())+' | tracker</div>' +
            '</div>' +
            '<div class="entry-dur">'+fmt(e.duration)+'</div>' +
          '</li>';
        }).join('');
      }

      t.sizeTo('#root').catch(function(){});
    }

    /* ── toggle details event ────────────────────────────── */
    document.getElementById('toggle-details-btn').addEventListener('click', function () {
      var detailsSec = document.getElementById('details-section');
      var btn = this;
      
      if (detailsSec.style.display === 'none') {
        detailsSec.style.display = 'block';
        btn.textContent = 'Hide Details';
      } else {
        detailsSec.style.display = 'none';
        btn.textContent = 'Show Details';
      }
      
      t.sizeTo('#root').catch(function(){});
    });

    /* ── toggle start/stop click (CON CONTROL CONCURRENTE Y AUTOPAUSA) ── */
    document.getElementById('toggle-btn').addEventListener('click', function () {
      if (!state || !me) return;
      var btn = this;
      btn.disabled = true;
      showError('');
      setSaveStatus('Guardando…');

      Promise.all([
        t.get('card', 'shared', KEY).catch(function(){ return null; }),
        t.get('board', 'shared', ACTIVE_KEY).catch(function(){ return {}; }),
        t.card('id', 'name').catch(function(){ return { id: '', name: '' }; })
      ]).then(function(results) {
        var freshCardState = results[0] || {};
        var activeUsers    = results[1] || {};
        var currentCard    = results[2];

        if (!freshCardState.sessions) freshCardState.sessions = {};
        if (!freshCardState.entries)  freshCardState.entries  = [];

        var isRunningOnThisCard = !!freshCardState.sessions[me.id];

        if (isRunningOnThisCard) {
          /* ── DETENER EL TIMER ACTUAL ── */
          var sess = freshCardState.sessions[me.id];
          var now  = Date.now();
          var dur  = Math.floor((now - sess.startTime) / 1000);
          if (dur > 0) {
            freshCardState.entries.push({
              memberId:   me.id,
              memberName: me.fullName,
              avatarUrl:  me.avatarUrl || '',
              start:      sess.startTime,
              end:        now,
              duration:   dur
            });
          }
          delete freshCardState.sessions[me.id];
          delete activeUsers[me.id];

          return Promise.all([
            t.set('card', 'shared', KEY, freshCardState),
            t.set('board', 'shared', ACTIVE_KEY, activeUsers)
          ]).then(function() {
            state = freshCardState;
            render();
            setSaveStatus('');
          });

        } else {
          /* ── INICIAR TIMER EN ESTA TARJETA ── */
          var prevSession = activeUsers[me.id];
          var closePrevCardPromise = Promise.resolve();

          if (prevSession && prevSession.cardId && prevSession.cardId !== currentCard.id) {
            closePrevCardPromise = t.get(prevSession.cardId, 'shared', KEY).then(function(prevCardState) {
              if (prevCardState && prevCardState.sessions && prevCardState.sessions[me.id]) {
                var pSess = prevCardState.sessions[me.id];
                var now   = Date.now();
                var dur   = Math.floor((now - pSess.startTime) / 1000);
                if (dur > 0) {
                  if (!prevCardState.entries) prevCardState.entries = [];
                  prevCardState.entries.push({
                    memberId:   me.id,
                    memberName: me.fullName,
                    avatarUrl:  me.avatarUrl || '',
                    start:      pSess.startTime,
                    end:        now,
                    duration:   dur
                  });
                }
                delete prevCardState.sessions[me.id];
                return t.set(prevSession.cardId, 'shared', KEY, prevCardState);
              }
            }).catch(function(e) {
              console.warn('Advertencia al cerrar la tarjeta previa:', e);
            });
          }

          return closePrevCardPromise.then(function() {
            var now = Date.now();
            freshCardState.sessions[me.id] = {
              startTime:  now,
              memberName: me.fullName,
              avatarUrl:  me.avatarUrl || ''
            };
            activeUsers[me.id] = {
              cardId:    currentCard.id,
              cardName:  currentCard.name,
              startTime: now
            };

            return Promise.all([
              t.set('card', 'shared', KEY, freshCardState),
              t.set('board', 'shared', ACTIVE_KEY, activeUsers)
            ]).then(function() {
              state = freshCardState;
              render();
              setSaveStatus('');
            });
          });
        }
      }).catch(function(err) {
        setSaveStatus('Error', true);
        showError('No se pudo guardar el cambio: ' + String(err));
      }).then(function() {
        btn.disabled = false;
      });
    });

    /* ── reset button ────────────────────────────────────── */
    document.getElementById('reset-btn').addEventListener('click', function () {
      if (!state || !me || !confirm('¿Eliminar tus registros?')) return;
      if (state.sessions) delete state.sessions[me.id];
      state.entries = (state.entries||[]).filter(function(e){ return e.memberId!==me.id; });
      render();
      
      t.get('board', 'shared', ACTIVE_KEY).then(function(activeUsers){
        activeUsers = activeUsers || {};
        delete activeUsers[me.id];
        return Promise.all([
          t.set('card', 'shared', KEY, state),
          t.set('board', 'shared', ACTIVE_KEY, activeUsers)
        ]);
      });
    });

    /* ── edit total button (MODIFICAR DATOS) ────────────────── */
    document.getElementById('edit-btn').addEventListener('click', function () {
      if (!state || !me) return;

      var currentSec = myTotal();
      var currentFormatted = fmt(currentSec);

      var input = prompt(
        "Ingresa el nuevo total de tiempo para tus registros en esta tarjeta:\n(Ejemplos: '02:30:00', '1h 30m', o '90' para 90 minutos)",
        currentFormatted
      );

      if (input === null) return;

      var newSeconds = parseTimeToSeconds(input);
      if (newSeconds === null || newSeconds < 0) {
        alert("Formato no válido. Ingresa el tiempo como 'HH:MM:SS', '1h 30m' o minutos.");
        return;
      }

      setSaveStatus('Guardando…');

      // Si había sesión activa para el usuario, se detiene
      if (state.sessions && state.sessions[me.id]) {
        delete state.sessions[me.id];
      }

      // Reemplaza las entradas del usuario por una entrada consolidada con el nuevo total
      state.entries = (state.entries || []).filter(function(e){ return e.memberId !== me.id; });

      if (newSeconds > 0) {
        var now = Date.now();
        state.entries.push({
          memberId:   me.id,
          memberName: me.fullName,
          avatarUrl:  me.avatarUrl || '',
          start:      now - (newSeconds * 1000),
          end:        now,
          duration:   newSeconds
        });
      }

      t.get('board', 'shared', ACTIVE_KEY).then(function(activeUsers){
        activeUsers = activeUsers || {};
        delete activeUsers[me.id];
        return Promise.all([
          t.set('card', 'shared', KEY, state),
          t.set('board', 'shared', ACTIVE_KEY, activeUsers)
        ]);
      }).then(function(){
        render();
        setSaveStatus('');
      }).catch(function(err){
        setSaveStatus('Error', true);
        showError('Error al modificar tiempo: ' + String(err));
      });
    });

    /* ── init ────────────────────────────────────────────── */
    var memberFetch = t.member('id', 'fullName', 'username', 'avatar').catch(function () {
      return { id: 'anon-' + Math.random().toString(36).slice(2), fullName: 'Usuario', username: 'usuario', avatar: null };
    });

    t.card('name').then(function(cardData) {
      if(cardData && cardData.name) {
        document.getElementById('task-title-mock').value = cardData.name;
      }
    }).catch(function(){});

    Promise.all([
      t.get('card', 'shared', KEY).catch(function(){ return null; }),
      memberFetch
    ]).then(function (results) {
      var raw = results[0];
      var m   = results[1];

      var avatarUrl = '';
      if (m && m.avatar) {
        avatarUrl = 'https://trello-members.s3.amazonaws.com/' + m.id + '/' + m.avatar + '/50.png';
      }

      me = {
        id:        (m && m.id) || 'anon',
        fullName: (m && (m.fullName || m.username)) || 'Usuario',
        avatarUrl: avatarUrl
      };

      state = raw || {};
      if (!state.sessions) state.sessions = {};
      if (!state.entries)  state.entries  = [];

      render();
    }).catch(function (err) {
      showError('Error al inicializar: ' + String(err));
    });

  })();
  </script>
</body>
</html>
