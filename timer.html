<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TrackingTime</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1f22;
      color: #b6c2cf;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    /* ── Header ───────────────────────────────────────────── */
    .wl-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .wl-title {
      font-size: 14px;
      font-weight: 600;
      color: #dee4ea;
    }
    .wl-toggle-btn {
      background: #2c2e33;
      color: #9f9f9f;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .wl-toggle-btn:hover {
      background: #3a3d45;
      color: #fff;
    }

    /* ── Active Timer Block ───────────────────────────────── */
    .tracker-box {
      background: #282a2e;
      border-radius: 4px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .tracker-left {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .loop-icon {
      color: #8c9199;
      font-size: 14px;
      cursor: pointer;
    }
    .tracker-input {
      background: transparent;
      border: none;
      color: #dee4ea;
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      outline: none;
    }
    .tracker-dot {
      color: #8c9199;
    }
    .clock {
      font-size: 16px;
      font-weight: 700;
      color: #dee4ea;
      font-variant-numeric: tabular-nums;
    }
    .clock.running {
      color: #fff;
    }
    
    /* Botón único adaptado visualmente */
    .btn {
      border: none;
      background: #3a3d45;
      color: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    .btn-start { background: #0052cc; }
    .btn-stop  { background: #de350b; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Estimation & Progress Bar ────────────────────────── */
    .estimate-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #9fa6b2;
      margin-bottom: 6px;
    }
    .estimate-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .avatars-preview {
      display: flex;
      align-items: center;
    }
    .avatars-preview .av {
      margin-left: -6px;
      border: 2px solid #1e1f22;
    }
    .avatars-preview .av:first-child {
      margin-left: 0;
    }
    .progress-container {
      margin-bottom: 16px;
    }
    .progress-bar-bg {
      height: 4px;
      background: #3a3d45;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .progress-bar-fill {
      height: 100%;
      background: #de350b;
      width: 100%;
    }
    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #8c9199;
    }

    .divider {
      height: 1px;
      background: #2c2e33;
      margin: 14px 0;
    }

    /* ── Entries List ─────────────────────────────────────── */
    .entries-lbl {
      font-size: 11px;
      font-weight: 700;
      color: #8c9199;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }
    .entries {
      list-style: none;
    }
    .entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .av {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      overflow: hidden;
    }
    .av img { width: 100%; height: 100%; object-fit: cover; }
    
    .entry-info {
      flex: 1;
      min-width: 0;
    }
    .entry-name {
      font-size: 13px;
      font-weight: 600;
      color: #dee4ea;
    }
    .entry-time {
      font-size: 11px;
      color: #8c9199;
      margin-top: 1px;
    }
    .entry-dur {
      font-size: 13px;
      font-weight: 600;
      color: #dee4ea;
      font-variant-numeric: tabular-nums;
    }

    .empty-msg { font-style: italic; color: #8c9199; padding: 8px 0; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .reset-btn {
      background: none;
      border: none;
      color: #8c9199;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-btn:hover { color: #f87168; }
    .save-status { font-size: 11px; color: #8c9199; }
    .err-banner { display:none; background:#3d1f1f; border:1px solid #7a2d2d; border-radius:4px; padding:6px 10px; font-size:11px; color:#f87168; margin-bottom:6px; }
  </style>
</head>
<body>
  <div id="root">
    <div class="err-banner" id="err-banner"></div>

    <div class="wl-header">
      <span class="wl-title">Work log</span>
      <button class="wl-toggle-btn" id="toggle-details-btn">Show Details</button>
    </div>

    <!-- Sección esencial (Siempre visible) -->
    <div class="tracker-box">
      <div class="tracker-left">
        <span class="loop-icon">⟳</span>
        <input type="text" class="tracker-input" value="Tiempo de tarea activo" id="task-title-mock">
        <span class="tracker-dot">•</span>
        <div class="clock" id="clock">--:--:--</div>
      </div>
      <button class="btn btn-start" id="toggle-btn" disabled>▶ Iniciar</button>
    </div>

    <!-- Sección de detalles (Oculta por defecto) -->
    <div id="details-section" style="display: none;">
      <div class="estimate-row">
        <div class="estimate-left">
          <span>Estimate time <strong>29h 30m</strong></span>
          <div class="avatars-preview" id="avatars-container-mock"></div>
        </div>
        <span class="wl-toggle-btn" style="background:transparent; padding:0;">+</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill"></div>
        </div>
        <div class="progress-labels">
          <span>635h 7m</span>
          <span style="color:#f87168;">615h 37m over estimate</span>
        </div>
      </div>

      <div style="display: flex; justify-content: space-between; font-size: 11px; color: #8c9199; margin-bottom: 10px;">
        <span>Mi total: <strong id="my-total" style="color:#dee4ea;">--:--:--</strong></span>
        <span>Total tarjeta: <strong id="all-total" style="color:#dee4ea;">--:--:--</strong></span>
      </div>

      <div class="divider"></div>

      <div class="entries-lbl">Logs de trabajo</div>
      <ul class="entries" id="entries"></ul>

      <div class="footer">
        <button class="reset-btn" id="reset-btn" disabled>Reiniciar mis datos</button>
        <span class="save-status" id="save-status"></span>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var KEY  = 'chronos';
    var t    = window.TrelloPowerUp.iframe();
    var state = null;
    var me    = null;
    var tick  = null;

    /* ── helpers ─────────────────────────────────────────── */
    function fmt(sec) {
      sec = Math.max(0, Math.floor(sec||0));
      var h = Math.floor(sec / 3600);
      var m = Math.floor((sec % 3600) / 60);
      var s = sec % 60;
      return [h,m,s].map(function(v){ return String(v).padStart(2,'0'); }).join(':');
    }
    function fmtTime(ts) {
      var d = new Date(ts);
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function initials(name) {
      return (name||'?').trim().split(/\s+/).slice(0,2).map(function(w){ return w[0]||'?'; }).join('').toUpperCase();
    }
    var COLORS = ['#579dff','#4bce97','#fea362','#9f8fef','#e774bb','#f87168'];
    function memberColor(id) {
      var h = 0;
      for (var i = 0; i < (id||'').length; i++) { h = (h * 31 + id.charCodeAt(i)) | 0; }
      return COLORS[Math.abs(h) % COLORS.length];
    }
    function avatarHtml(memberId, memberName, avatarUrl) {
      var color = memberColor(memberId || 'x');
      if (avatarUrl) {
        return '<div class="av"><img src="' + esc(avatarUrl) + '" onerror="this.parentNode.style.background=\'' + color + '\';this.remove()"></div>';
      }
      return '<div class="av" style="background:' + color + '">' + esc(initials(memberName)) + '</div>';
    }
    function showError(msg) {
      var el = document.getElementById('err-banner');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }
    function setSaveStatus(msg, isErr) {
      var el = document.getElementById('save-status');
      el.textContent = msg;
      el.className = 'save-status' + (isErr ? ' err' : '');
    }

    /* ── time calculations ───────────────────────────────── */
    function myTotal() {
      if (!state || !me) return 0;
      var base = (state.entries||[]).filter(function(e){ return e.memberId === me.id; })
                                    .reduce(function(s,e){ return s+(e.duration||0); },0);
      var sess = state.sessions && state.sessions[me.id];
      if (sess && sess.startTime) base += Math.floor((Date.now()-sess.startTime)/1000);
      return base;
    }
    function allTotal() {
      if (!state) return 0;
      var base = (state.entries||[]).reduce(function(s,e){ return s+(e.duration||0); },0);
      if (state.sessions) {
        Object.keys(state.sessions).forEach(function(id){
          var s = state.sessions[id];
          if (s && s.startTime) base += Math.floor((Date.now()-s.startTime)/1000);
        });
      }
      return base;
    }

    /* ── clock tick ──────────────────────────────────────── */
    function updateClock() {
      if (!state || !me) return;
      var sess = state.sessions && state.sessions[me.id];
      if (!sess || !sess.startTime) return;
      var elapsed = Math.floor((Date.now()-sess.startTime)/1000);
      document.getElementById('clock').textContent    = fmt(elapsed);
      document.getElementById('my-total').textContent = fmt(myTotal());
      document.getElementById('all-total').textContent= fmt(allTotal());
    }

    /* ── render ──────────────────────────────────────────── */
    function render() {
      if (!state || !me) return;

      var btn     = document.getElementById('toggle-btn');
      var resetBtn= document.getElementById('reset-btn');
      btn.disabled     = false;
      resetBtn.disabled= false;

      var mySess  = state.sessions && state.sessions[me.id];
      var running = !!mySess;
      var clockEl  = document.getElementById('clock');

      if (running) {
        clockEl.className = 'clock running';
        btn.className = 'btn btn-stop';
        btn.textContent = '⏹ Stop';
        if (!tick) { updateClock(); tick = setInterval(updateClock, 1000); }
      } else {
        if (tick) { clearInterval(tick); tick = null; }
        clockEl.className   = 'clock';
        clockEl.textContent = '00:00:00';
        btn.className = 'btn btn-start';
        btn.textContent = '▶ Play';
        document.getElementById('my-total').textContent  = fmt(myTotal());
        document.getElementById('all-total').textContent = fmt(allTotal());
      }

      /* Entradas recientes (Logs) */
      var entries = (state.entries||[]).slice().reverse().slice(0,7);
      var el = document.getElementById('entries');
      var avContainerMock = document.getElementById('avatars-container-mock');
      
      if (!entries.length) {
        el.innerHTML = '<li class="empty-msg">Sin registros en esta tarjeta</li>';
        avContainerMock.innerHTML = avatarHtml(me.id, me.fullName, me.avatarUrl);
      } else {
        var uniqueAvatars = {};
        el.innerHTML = entries.map(function(e){
          var isMe = e.memberId===me.id;
          var name = isMe ? 'Tú' : (e.memberName||'Desconocido');
          
          uniqueAvatars[e.memberId] = avatarHtml(e.memberId, e.memberName, e.avatarUrl);

          return '<li class="entry">' +
            avatarHtml(e.memberId, e.memberName, e.avatarUrl) +
            '<div class="entry-info">' +
              '<div class="entry-name">'+esc(name)+'</div>' +
              '<div class="entry-time">'+fmtTime(e.start)+' – '+fmtTime(e.end)+' | tracker</div>' +
            '</div>' +
            '<div class="entry-dur">'+fmt(e.duration)+'</div>' +
          '</li>';
        }).join('');

        avContainerMock.innerHTML = Object.keys(uniqueAvatars).map(function(k){ return uniqueAvatars[k]; }).join('');
      }

      t.sizeTo('#root').catch(function(){});
    }

    /* ── toggle details event ────────────────────────────── */
    document.getElementById('toggle-details-btn').addEventListener('click', function () {
      var detailsSec = document.getElementById('details-section');
      var btn = this;
      
      if (detailsSec.style.display === 'none') {
        detailsSec.style.display = 'block';
        btn.textContent = 'Hide Details';
      } else {
        detailsSec.style.display = 'none';
        btn.textContent = 'Show Details';
      }
      
      t.sizeTo('#root').catch(function(){});
    });

    /* ── save ────────────────────────────────────────────── */
    function save() {
      setSaveStatus('Guardando…');
      return t.set('card', 'shared', KEY, state).then(function(){
        setSaveStatus('');
      }).catch(function(err){
        setSaveStatus('Error', true);
        showError('No se pudo guardar: ' + String(err));
        throw err;
      });
    }

    /* ── button click ────────────────────────────────────── */
    document.getElementById('toggle-btn').addEventListener('click', function () {
      if (!state || !me) return;

      if (state.sessions && state.sessions[me.id]) {
        var sess = state.sessions[me.id];
        var now  = Date.now();
        var dur  = Math.floor((now - sess.startTime) / 1000);
        if (dur > 0) {
          state.entries = (state.entries||[]).concat([{
            memberId:   me.id,
            memberName: me.fullName,
            avatarUrl:  me.avatarUrl || '',
            start:      sess.startTime,
            end:        now,
            duration:   dur
          }]);
        }
        delete state.sessions[me.id];
      } else {
        if (!state.sessions) state.sessions = {};
        state.sessions[me.id] = {
          startTime:  Date.now(),
          memberName: me.fullName,
          avatarUrl:  me.avatarUrl || ''
        };
      }

      render();
      save();
    });

    /* ── reset button ────────────────────────────────────── */
    document.getElementById('reset-btn').addEventListener('click', function () {
      if (!state || !me || !confirm('¿Eliminar tus registros?')) return;
      if (state.sessions) delete state.sessions[me.id];
      state.entries = (state.entries||[]).filter(function(e){ return e.memberId!==me.id; });
      render();
      save();
    });

    /* ── init ────────────────────────────────────────────── */
    var memberFetch = t.member('id', 'fullName', 'username', 'avatar').catch(function () {
      return { id: 'anon-' + Math.random().toString(36).slice(2), fullName: 'Usuario', username: 'usuario', avatar: null };
    });

    t.card('name').then(function(cardData) {
      if(cardData && cardData.name) {
        document.getElementById('task-title-mock').value = cardData.name;
      }
    }).catch(function(){});

    Promise.all([
      t.get('card', 'shared', KEY).catch(function(){ return null; }),
      memberFetch
    ]).then(function (results) {
      var raw = results[0];
      var m   = results[1];

      var avatarUrl = '';
      if (m && m.avatar) {
        avatarUrl = 'https://trello-members.s3.amazonaws.com/' + m.id + '/' + m.avatar + '/50.png';
      }

      me = {
        id:        (m && m.id) || 'anon',
        fullName: (m && (m.fullName || m.username)) || 'Usuario',
        avatarUrl: avatarUrl
      };

      state = raw || {};
      if (!state.sessions) state.sessions = {};
      if (!state.entries)  state.entries  = [];

      render();
    }).catch(function (err) {
      showError('Error: ' + String(err));
    });

  })();
  </script>
</body>
</html>
