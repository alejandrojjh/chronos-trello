<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TrackingTime</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
(function () {
  var KEY         = 'chronos';
  var SUM_KEY     = 'chronos-summary';   /* board shared: totals per card + per member */
  var DAILY_KEY   = 'chronos-daily';     /* board shared: per-day entries */

  /* ── helpers ─────────────────────────────────────────────── */
  function getTotalAll(d) {
    var base = ((d&&d.entries)||[]).reduce(function(a,e){ return a+(e.duration||0); },0);
    if (d&&d.sessions) Object.keys(d.sessions).forEach(function(id){
      var s=d.sessions[id]; if(s&&s.startTime) base+=Math.floor((Date.now()-s.startTime)/1000);
    });
    return base;
  }
  function anyRunning(d) {
    return !!(d&&d.sessions&&Object.keys(d.sessions).length>0);
  }
  function getActiveUsersText(d) {
    if (!d || !d.sessions) return '';
    var names = [];
    Object.keys(d.sessions).forEach(function(id){
      var s = d.sessions[id];
      if (s && s.memberName) names.push(s.memberName);
    });
    if (names.length === 0) return 'Working on it...';
    return names.join(', ') + ' working on it...';
  }
  function memberTotals(d) {
    var map = {};
    ((d&&d.entries)||[]).forEach(function(e){
      if (!e.memberId) return;
      if (!map[e.memberId]) map[e.memberId]={ name:e.memberName||'', avatarUrl:e.avatarUrl||'', total:0 };
      map[e.memberId].total += e.duration||0;
    });
    if (d&&d.sessions) Object.keys(d.sessions).forEach(function(id){
      var s=d.sessions[id]; if(!s||!s.startTime) return;
      var live=Math.floor((Date.now()-s.startTime)/1000);
      if (!map[id]) map[id]={ name:s.memberName||'', avatarUrl:s.avatarUrl||'', total:0 };
      map[id].total += live;
    });
    return map;
  }

  function updateBoardSummary(t, cardId, cardName, chronosData) {
    return Promise.all([
      t.get('board', 'shared', SUM_KEY).catch(function(){ return {}; }),
      t.get('board', 'shared', DAILY_KEY).catch(function(){ return {}; })
    ]).then(function(r) {
      var summary = r[0] || {};
      var daily   = r[1] || {};

      var total   = getTotalAll(chronosData);
      var running = anyRunning(chronosData);

      Object.keys(daily).forEach(function(day){
        daily[day] = daily[day].filter(function(d){ return d.cardId !== cardId; });
        if (daily[day].length === 0) delete daily[day];
      });

      if (!chronosData || (!total && !running)) {
        delete summary[cardId];
      } else {
        var mMap  = memberTotals(chronosData);
        var mList = Object.keys(mMap).map(function(id){
          return { id:id, name:mMap[id].name, avatarUrl:mMap[id].avatarUrl, total:mMap[id].total };
        });
        summary[cardId] = {
          name:      cardName,
          total:     total,
          running:   running,
          members:   mList,
          updatedAt: Date.now()
        };

        var cutoff = Date.now() - 365*24*3600*1000;
        ((chronosData&&chronosData.entries)||[]).forEach(function(e){
          if (!e.start || e.start < cutoff) return;
          var day = new Date(e.start).toISOString().slice(0,10);
          if (!daily[day]) daily[day] = [];
          
          daily[day].push({
            cardId:     cardId,
            cardName:   cardName,
            memberId:   e.memberId||'',
            memberName: e.memberName||'',
            avatarUrl:  e.avatarUrl||'',
            duration:   e.duration||0,
            start:      e.start
          });
        });
      }

      var cutoffGeneral = Date.now() - 365*24*3600*1000;
      Object.keys(daily).forEach(function(day){
        if (new Date(day).getTime() < cutoffGeneral) delete daily[day];
      });

      return Promise.all([
        t.set('board', 'shared', SUM_KEY,   summary),
        t.set('board', 'shared', DAILY_KEY, daily)
      ]);
    }).catch(function(err){ console.warn('TrackingTime summary update failed:', err); });
  }

  var baseUrl = location.href.replace(/\/[^/]*$/, '');

  window.TrelloPowerUp.initialize({

    /* ── card-buttons ─────────────────────────────────────── */
    'card-buttons': function (t) {
      return t.get('card', 'shared', KEY).then(function(d){
        var running = anyRunning(d);
        return [{
          icon: 'https://cdn-icons-png.flaticon.com/512/111/111168.png',
          text: running ? '⏹ Detener mi timer' : '▶ Iniciar mi timer',
          callback: function (t) {
            return t.popup({ title:'TrackingTime', url: baseUrl+'/timer.html', height:420 });
          }
        }];
      });
    },

    /* ── card-badges (vista frontal en la tarjeta del tablero) ─────────── */
    'card-badges': function (t) {
      return [{
        dynamic: function () {
          return Promise.all([
            t.get('card', 'shared', KEY),
            t.card('id', 'name').catch(function(){ return { id:'', name:'' }; })
          ]).then(function(r){
            var d       = r[0];
            var card    = r[1];
            var running = anyRunning(d);

            if (card.id) updateBoardSummary(t, card.id, card.name, d);

            // Si nadie está trabajando en la tarjeta, NO se muestra nada
            if (!running) return [];

            return {
              text:    getActiveUsersText(d),
              color:   null, // Sin borde destacado ni color de fondo
              refresh: 10
            };
          });
        }
      }];
    },

    /* ── card-detail-badges (insignia en la parte superior interna de la tarjeta) ── */
    'card-detail-badges': function (t) {
      return [{
        dynamic: function () {
          return t.get('card', 'shared', KEY).then(function(d){
            var running = anyRunning(d);

            // Si nadie está trabajando, NO se muestra nada arriba
            if (!running) return [];

            return {
              title:   '',
              text:    getActiveUsersText(d),
              color:   null, // Texto plano sin contenedores de color
              refresh: 10
            };
          });
        }
      }];
    },

    /* ── card-back-section ────────────────────────────────── */
    'card-back-section': function (t) {
      return {
        title: 'TrackingTime',
        icon:  'https://cdn-icons-png.flaticon.com/512/111/111168.png',
        content: { type:'iframe', url: t.signUrl(baseUrl+'/timer.html'), height:230 }
      };
    },

    /* ── board-buttons ────────────────────────────────────── */
    'board-buttons': function (t) {
      return [{
        icon: {
          dark:  'https://cdn-icons-png.flaticon.com/512/111/111168.png',
          light: 'https://cdn-icons-png.flaticon.com/512/111/111168.png'
        },
        text: 'TrackingTime Reports',
        callback: function (t) {
          return t.modal({
            title:      'TrackingTime Reports',
            url:        t.signUrl(baseUrl+'/dashboard.html'),
            fullscreen: false,
            height:     700
          });
        }
      }];
    },

    /* ── show-settings ────────────────────────────────────── */
    'show-settings': function (t) {
      return t.popup({
        title:  'TrackingTime – Configuración',
        url:    t.signUrl(baseUrl+'/settings.html'),
        height: 420
      });
    }

  });
})();
</script>
</body>
</html>
